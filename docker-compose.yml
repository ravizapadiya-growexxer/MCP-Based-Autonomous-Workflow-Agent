services:
  automation:
    build: .
    container_name: intern_automation
    restart: unless-stopped
    env_file: .env
    environment:
      TZ: Asia/Kolkata
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    ports:
      - "5050:5050"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:5050/health',timeout=3).status==200 else 1)"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 30s
